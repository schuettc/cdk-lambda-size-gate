name: Published action e2e

# End-to-end verification of the PUBLISHED action: downloads the released
# binary (unlike action-selftest, which builds locally). Exercises both the
# full-semver direct-download path (@v1.0.0) and the major-tag → latest
# fallback (@v1), on linux and windows (zip/.exe extraction).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Generate passing fixture
        shell: bash
        run: |
          mkdir -p fixture/cdk.out/asset.ok
          head -c 1024 /dev/zero > fixture/cdk.out/asset.ok/handler.py
          cat > fixture/cdk.out/Stack.template.json <<'EOF'
          {"Resources":{"Fn":{"Type":"AWS::Lambda::Function","Properties":{"Code":{"S3Key":"ok.zip"}}}}}
          EOF
          cat > fixture/cdk.out/Stack.assets.json <<'EOF'
          {"files":{"ok":{"source":{"path":"asset.ok","packaging":"zip"}}}}
          EOF

      - name: Gate via published action @v1.0.0 (direct semver download)
        uses: schuettc/cdk-lambda-size-gate@v1.0.0
        with:
          cdk-out: fixture/cdk.out

      - name: Gate via published action @v1 (major tag → latest release)
        uses: schuettc/cdk-lambda-size-gate@v1
        with:
          cdk-out: fixture/cdk.out

      - name: Oversized fixture must fail via published action
        id: oversized
        continue-on-error: true
        uses: schuettc/cdk-lambda-size-gate@v1
        with:
          cdk-out: fixture/cdk.out
          hard-limit: "500"

      - name: Assert the oversized step failed
        shell: bash
        env:
          OUTCOME: ${{ steps.oversized.outcome }}
        run: |
          [ "$OUTCOME" = "failure" ] || { echo "expected failure outcome, got $OUTCOME"; exit 1; }
