name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: gofmt
        if: runner.os != 'Windows'
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: build
        run: go build .
      - name: self-test (missing cdk.out exits 2)
        if: runner.os != 'Windows'
        run: |
          set +e
          ./cdk-lambda-size-gate -cdk-out /definitely/not/there
          [ $? -eq 2 ] || { echo "expected exit 2"; exit 1; }
